<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>樂法 客戶管理系統</title>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a18;
  --text2: #5a5a56;
  --text3: #9a9a94;
  --accent: #1a1a18;
  --blue: #2563eb; --blue-bg: #eff6ff; --blue-text: #1d4ed8;
  --green: #16a34a; --green-bg: #f0fdf4; --green-text: #15803d;
  --amber: #d97706; --amber-bg: #fffbeb; --amber-text: #b45309;
  --red: #dc2626; --red-bg: #fef2f2; --red-text: #b91c1c;
  --purple: #7c3aed; --purple-bg: #f5f3ff; --purple-text: #6d28d9;
  --teal: #0d9488; --teal-bg: #f0fdfa; --teal-text: #0f766e;
  --r: 8px; --r2: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.logo-area{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-name{font-size:16px;font-weight:700;letter-spacing:.02em}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.nav{flex:1;padding:10px 10px;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:0 8px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);transition:.12s;font-size:13px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--text);color:#fff;font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.75}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;font-size:10px;background:var(--red-bg);color:var(--red-text);padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;flex:1}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-select{padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none}
.filter-select:focus{border-color:var(--blue)}
.search-input{padding:6px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none;min-width:200px}
.search-input:focus{border-color:var(--blue)}
.filter-sep{height:24px;width:1px;background:var(--border2);margin:0 2px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:inherit;transition:.12s;font-weight:400;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.87}
.btn-sm{padding:4px 10px;font-size:12px}
.btn svg{width:14px;height:14px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:24px;font-weight:700;letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-up{color:var(--green)}
.stat-down{color:var(--red)}

/* Tags / Pills */
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.tag-blue{background:var(--blue-bg);color:var(--blue-text)}
.tag-green{background:var(--green-bg);color:var(--green-text)}
.tag-amber{background:var(--amber-bg);color:var(--amber-text)}
.tag-red{background:var(--red-bg);color:var(--red-text)}
.tag-purple{background:var(--purple-bg);color:var(--purple-text)}
.tag-teal{background:var(--teal-bg);color:var(--teal-text)}
.tag-gray{background:var(--bg);color:var(--text2);border:1px solid var(--border2)}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.table-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
tbody tr{border-bottom:1px solid var(--border);transition:.1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 14px;vertical-align:middle}

/* Progress bar */
.progress-wrap{background:var(--bg);border-radius:4px;height:6px;overflow:hidden;min-width:80px}
.progress-fill{height:100%;border-radius:4px;background:var(--blue);transition:width .3s}
.progress-fill.green{background:var(--green)}
.progress-fill.amber{background:var(--amber)}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:.15s;position:relative}
.client-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.client-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.client-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.client-name{font-size:14px;font-weight:600;margin-bottom:2px}
.client-meta{font-size:11px;color:var(--text3)}
.client-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.cs-item{font-size:11px}
.cs-label{color:var(--text3);margin-bottom:2px}
.cs-val{font-weight:600;font-size:13px}

/* Panel */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.panel-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

/* Form */
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;display:block}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:.12s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
select.form-input{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:var(--r2);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px 6px;line-height:1}

/* Client detail drawer */
.drawer{position:fixed;right:0;top:0;height:100vh;width:660px;background:var(--surface);border-left:1px solid var(--border);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 30px rgba(0,0,0,.08)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px}
.drawer-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px;margin-top:-4px}
.dtab{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);margin-bottom:-1px;transition:.1s}
.dtab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Mini chart */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:60px;padding-top:4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:.3s}
.bar-label{font-size:9px;color:var(--text3);white-space:nowrap}

/* Type color map */
.type-口碑{color:var(--purple-text);background:var(--purple-bg)}
.type-社群{color:var(--blue-text);background:var(--blue-bg)}
.type-廣告{color:var(--amber-text);background:var(--amber-bg)}
.type-其他{color:var(--text2);background:var(--bg)}

/* Page visibility */
.page{display:none}
.page.active{display:block}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* Editable hint */
.edit-hint{font-size:10px;color:var(--text3);padding:2px 6px;border-radius:4px;border:1px dashed var(--border2);cursor:pointer}
.edit-hint:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo-area">
    <div class="logo-name">樂法行銷</div>
    <div class="logo-sub">客戶管理系統 v1.0</div>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <div class="nav-label">主選單</div>
      <button class="nav-item active" onclick="showPage('dashboard',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        儀表板
      </button>
      <button class="nav-item" onclick="showPage('clients',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
        客戶管理
      </button>
    </div>
    <div class="nav-section">
      <div class="nav-label">報表</div>
      <button class="nav-item" onclick="showPage('report-total',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><path d="M5 8h6M5 11h4M5 5h6"/></svg>
        總表
      </button>
      <button class="nav-item" onclick="showPage('report-vendor',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/><path d="M5 4V2h6v2"/></svg>
        廠商執行表
      </button>
      <button class="nav-item" onclick="showPage('report-spec',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12V4l4-2 4 2 4-2v8l-4 2-4-2-4 2z"/></svg>
        規格統計表
      </button>
      <button class="nav-item" onclick="showPage('report-freelancer',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.8 2.2-5 5-5"/><path d="M10 9l1.5 1.5L14 8"/></svg>
        外包人員統計
      </button>
    </div>
    <div class="nav-section">
      <div class="nav-label">設定</div>
      <button class="nav-item" onclick="showPage('settings',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
        廠商 / 外包人員
      </button>
    </div>
  </nav>
  <div class="sidebar-footer">© 2026 樂法網路行銷</div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- ===== DASHBOARD ===== -->
  <div id="page-dashboard" class="page active">
    <div class="topbar">
      <div>
        <div class="topbar-title">儀表板</div>
        <div class="topbar-sub">總覽所有客戶專案執行狀況</div>
      </div>
      <select class="filter-select" id="dash-filter-type" onchange="renderDashboard()">
        <option value="">全部規格</option>
        <option value="口碑">口碑</option>
        <option value="社群">社群</option>
        <option value="廣告">廣告</option>
        <option value="其他">其他</option>
      </select>
      <select class="filter-select" id="dash-filter-client" onchange="renderDashboard()">
        <option value="">全部客戶</option>
      </select>
      <select class="filter-select" id="dash-filter-contract" onchange="renderDashboard()">
        <option value="">全部走期</option>
        <option value="半年以下">半年以下</option>
        <option value="半年以上">半年以上</option>
      </select>
    </div>
    <div class="content" id="dashboard-content"></div>
  </div>

  <!-- ===== CLIENTS ===== -->
  <div id="page-clients" class="page">
    <div class="topbar">
      <div>
        <div class="topbar-title">客戶管理</div>
        <div class="topbar-sub">客戶基本資料與規格成本表</div>
      </div>
      <input class="search-input" placeholder="搜尋客戶名稱..." id="client-search" oninput="renderClients()">
      <select class="filter-select" id="client-filter-contract" onchange="renderClients()">
        <option value="">全部走期</option>
        <option value="半年以下">半年以下</option>
        <option value="半年以上">半年以上</option>
      </select>
      <button class="btn btn-primary" onclick="openAddClient()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>
        新增客戶
      </button>
    </div>
    <div class="content" id="clients-content"></div>
  </div>

  <!-- ===== REPORT TOTAL ===== -->
  <div id="page-report-total" class="page">
    <div class="topbar">
      <div>
        <div class="topbar-title">總表</div>
        <div class="topbar-sub">全專案執行規格、費用彙總</div>
      </div>
      <select class="filter-select" id="rt-client" onchange="renderReportTotal()"><option value="">全部客戶</option></select>
      <select class="filter-select" id="rt-type" onchange="renderReportTotal()"><option value="">全部規格</option><option value="口碑">口碑</option><option value="社群">社群</option><option value="廣告">廣告</option><option value="其他">其他</option></select>
      <select class="filter-select" id="rt-vendor" onchange="renderReportTotal()"><option value="">全部廠商</option></select>
      <select class="filter-select" id="rt-freelancer" onchange="renderReportTotal()"><option value="">全部外包人員</option></select>
    </div>
    <div class="content" id="report-total-content"></div>
  </div>

  <!-- ===== REPORT VENDOR ===== -->
  <div id="page-report-vendor" class="page">
    <div class="topbar">
      <div>
        <div class="topbar-title">廠商執行表</div>
        <div class="topbar-sub">口碑發給帳號商的發案對帳表</div>
      </div>
      <select class="filter-select" id="rv-client" onchange="renderReportVendor()"><option value="">全部客戶</option></select>
      <select class="filter-select" id="rv-vendor" onchange="renderReportVendor()"><option value="">全部廠商</option></select>
      <select class="filter-select" id="rv-month" onchange="renderReportVendor()"><option value="">全部月份</option></select>
      <button class="btn btn-primary" onclick="openAddVendorRecord()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>
        新增記錄
      </button>
    </div>
    <div class="content" id="report-vendor-content"></div>
  </div>

  <!-- ===== REPORT SPEC ===== -->
  <div id="page-report-spec" class="page">
    <div class="topbar">
      <div>
        <div class="topbar-title">規格統計表</div>
        <div class="topbar-sub">所有專案各規格類型執行量與費用統計</div>
      </div>
      <select class="filter-select" id="rs-client" onchange="renderReportSpec()"><option value="">全部客戶</option></select>
      <select class="filter-select" id="rs-month" onchange="renderReportSpec()"><option value="">全部月份</option></select>
      <select class="filter-select" id="rs-freelancer" onchange="renderReportSpec()"><option value="">全部外包人員</option></select>
    </div>
    <div class="content" id="report-spec-content"></div>
  </div>

  <!-- ===== REPORT FREELANCER ===== -->
  <div id="page-report-freelancer" class="page">
    <div class="topbar">
      <div>
        <div class="topbar-title">外包人員統計</div>
        <div class="topbar-sub">每位外包人員每月執行支出（橫向串接）</div>
      </div>
      <select class="filter-select" id="rf-person" onchange="renderReportFreelancer()"><option value="">全部人員</option></select>
      <select class="filter-select" id="rf-month" onchange="renderReportFreelancer()"><option value="">全部月份</option></select>
      <select class="filter-select" id="rf-client" onchange="renderReportFreelancer()"><option value="">全部客戶</option></select>
      <button class="btn btn-primary" onclick="openAddFreelancerRecord()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>
        新增記錄
      </button>
    </div>
    <div class="content" id="report-freelancer-content"></div>
  </div>

  <!-- ===== SETTINGS ===== -->
  <div id="page-settings" class="page">
    <div class="topbar">
      <div><div class="topbar-title">廠商 / 外包人員管理</div></div>
      <button class="btn btn-primary" onclick="openAddVendor()">新增廠商</button>
      <button class="btn" onclick="openAddFreelancer()">新增外包人員</button>
    </div>
    <div class="content" id="settings-content"></div>
  </div>

</div>

<!-- Client Detail Drawer -->
<div class="drawer" id="client-drawer">
  <div class="drawer-head">
    <div>
      <div style="font-size:16px;font-weight:700" id="drawer-client-name">—</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px" id="drawer-client-meta">—</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-sm" id="drawer-edit-btn" onclick="">編輯</button>
      <button class="modal-close" onclick="closeDrawer()">×</button>
    </div>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>
<div id="drawer-overlay" style="position:fixed;inset:0;z-index:899;display:none" onclick="closeDrawer()"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">

// ─── HELPERS ────────────────────────────────────────────────────
function fmt(n){return n==null?'—':'$'+Math.round(n).toLocaleString()}
function pct(n){return n==null?'—':Math.round(n*100)+'%'}
function contractType(s,e){
  const d=(new Date(e)-new Date(s))/(1000*60*60*24);
  return d<=180?'半年以下':'半年以上';
}
function contractDays(s,e){return Math.round((new Date(e)-new Date(s))/(1000*60*60*24))}
function clientSpecs(cid){return DB.specItems.filter(s=>s.clientId===cid)}
function clientVendorCost(cid){return DB.vendorRecords.filter(r=>r.clientId===cid&&r.done).reduce((a,r)=>a+r.amount,0)}
function clientFreelancerCost(cid){return DB.freelancerRecords.filter(r=>r.clientId===cid).reduce((a,r)=>a+r.total,0)}
function specVendorCost(sid){return DB.vendorRecords.filter(r=>r.specItemId===sid&&r.done).reduce((a,r)=>a+r.amount,0)}
function specFreelancerCost(sid){return DB.freelancerRecords.filter(r=>r.specItemId===sid).reduce((a,r)=>a+r.total,0)}
function specDoneCount(sid){return DB.vendorRecords.filter(r=>r.specItemId===sid&&r.done).length + DB.freelancerRecords.filter(r=>r.specItemId===sid&&r.status==='完成').length}
function typeTag(t){const m={口碑:'purple',社群:'blue',廣告:'amber',其他:'gray'};return`<span class="tag type-${t}">${t}</span>`}
function contractTag(t){return t==='半年以下'?`<span class="tag tag-amber">${t}</span>`:`<span class="tag tag-blue">${t}</span>`}
function nextId(arr,prefix){const nums=arr.map(x=>parseInt(x.id.replace(prefix,''))).filter(Boolean);return prefix+(nums.length?String(Math.max(...nums)+1).padStart(3,'0'):'001')}

function showPage(id,btn){

  const renders={dashboard:renderDashboard,clients:renderClients,'report-total':renderReportTotal,'report-vendor':renderReportVendor,'report-spec':renderReportSpec,'report-freelancer':renderReportFreelancer,settings:renderSettings};
  if(renders[id])renders[id]();
}

  renderDrawerBody(clientId);
  document.getElementById('client-drawer').classList.add('open');
  document.getElementById('drawer-overlay').style.display='block';
}
function closeDrawer(){
  document.getElementById('client-drawer').classList.remove('open');

  const fContract=document.getElementById('dash-filter-contract').value;

  // populate client filter
  const sel=document.getElementById('dash-filter-client');
  if(sel.options.length<=1){DB.clients.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;sel.appendChild(o);})}

  const clients=DB.clients.filter(c=>{
    if(fClient&&c.id!==fClient)return false;
    if(fContract&&contractType(c.contractStart,c.contractEnd)!==fContract)return false;
    return true;
  });

  let specs=DB.specItems.filter(s=>{
    if(fClient&&s.clientId!==fClient)return false;
    if(fType&&s.type!==fType)return false;

  const totalContract=clients.reduce((a,c)=>a+c.totalContract,0);

    <div class="two-col">
      <div class="panel">
        <div class="panel-title">規格類型分布</div>

function initReportSelects(){
  ['rt-client','rv-client','rs-client','rf-client'].forEach(id=>{

    if(el&&el.options.length<=1)DB.clients.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;el.appendChild(o);});
  });
  ['rt-vendor','rv-vendor'].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&el.options.length<=1)DB.vendors.forEach(v=>{const o=document.createElement('option');o.value=v.id;o.textContent=v.name;el.appendChild(o);});
  });
  ['rt-freelancer','rs-freelancer','rf-person'].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&el.options.length<=1)DB.freelancers.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.name;el.appendChild(o);});
  });
  const months=[...new Set([...DB.vendorRecords.map(r=>r.month),...DB.freelancerRecords.map(r=>r.month)])].sort();
  ['rv-month','rs-month','rf-month'].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&el.options.length<=1)months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;el.appendChild(o);});
  });
}

    if(fm&&r.month!==fm)return false;
    if(fc&&r.clientId!==fc)return false;
    return true;
  });

  // group by person
  const byPerson={};
  recs.forEach(r=>{
    if(!byPerson[r.freelancerId])byPerson[r.freelancerId]={recs:[],total:0};
    byPerson[r.freelancerId].recs.push(r);
    byPerson[r.freelancerId].total+=r.total;
  });

  document.getElementById('report-freelancer-content').innerHTML=`
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-label">記錄筆數</div><div class="stat-value">${recs.length}</div></div>
      <div class="stat-card"><div class="stat-label">外包人員數</div><div class="stat-value">${Object.keys(byPerson).length}</div></div>
      <div class="stat-card"><div class="stat-label">外包費用合計</div><div class="stat-value" style="color:var(--blue)">${fmt(recs.reduce((a,r)=>a+r.total,0))}</div></div>
    </div>
    ${Object.entries(byPerson).map(([fid,data])=>{
      const f=DB.freelancers.find(x=>x.id===fid);
      const byMonth={};
      data.recs.forEach(r=>{if(!byMonth[r.month])byMonth[r.month]=0;byMonth[r.month]+=r.total;});
      return`<div class="table-wrap" style="margin-bottom:12px">
        <div class="table-header">
          <div class="table-title"><span class="tag tag-teal" style="margin-right:6px">${f?f.name:'—'}</span>${f?f.type:''}</div>
          <div style="display:flex;gap:12px;font-size:12px">
            ${Object.entries(byMonth).map(([m,t])=>`<span style="color:var(--text3)">${m} <strong style="color:var(--text)">${fmt(t)}</strong></span>`).join('')}
            <strong>${fmt(data.total)}</strong>
          </div>
        </div>
        <table>
          <thead><tr><th>月份</th><th>客戶</th><th>規格項目</th><th>項目類型</th><th style="text-align:right">數量</th><th style="text-align:right">單價</th><th style="text-align:right">小計</th><th>狀態</th></tr></thead>
          <tbody>${data.recs.map(r=>{
            const c=DB.clients.find(x=>x.id===r.clientId);
            const s=DB.specItems.find(x=>x.id===r.specItemId);
            return`<tr>
              <td style="color:var(--text3)">${r.month}</td>
              <td>${c?c.name:'—'}</td>
              <td>${s?typeTag(s.type)+' '+s.name:'—'}</td>
              <td>${r.itemType}</td>
              <td style="text-align:right">${r.qty}</td>
              <td style="text-align:right;color:var(--text2)">${fmt(r.unitCost)}</td>
              <td style="text-align:right;font-weight:500">${fmt(r.total)}</td>
              <td><span class="tag ${r.status==='完成'?'tag-green':'tag-amber'}">${r.status}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
    }).join('')||`<div style="text-align:center;padding:40px;color:var(--text3)">目前無符合條件的記錄</div>`}
  `;
}

function openAddVendorRecord(clientId){

    <div class="form-row">

function openAddFreelancerRecord(clientId){
  openModal('新增外包執行記錄',`
    <div class="form-row">
      <div class="form-group"><label class="form-label">客戶 *</label><select class="form-input" id="f-client">${DB.clients.map(c=>`<option value="${c.id}" ${c.id===clientId?'selected':''}>${c.name}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">規格項目 *</label><select class="form-input" id="f-spec">${DB.specItems.filter(s=>!clientId||s.clientId===clientId).map(s=>`<option value="${s.id}">${s.type}・${s.name}</option>`).join('')}</select></div>
    </div>
    <div class="form-row"><div class="form-group"><label class="form-label">外包人員 *</label><select class="form-input" id="f-person" onchange="updateRateHint(this.value)">${DB.freelancers.map(f=>`<option value="${f.id}">${f.name}（${f.type}）</option>`).join('')}</select></div><div class="form-group"><label class="form-label">月份</label><input class="form-input" type="month" id="f-month"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">項目類型</label><input class="form-input" id="f-itype" placeholder="如：即時回文-常規"></div><div class="form-group"><label class="form-label">數量</label><input class="form-input" type="number" id="f-qty" placeholder="1" oninput="calcTotal()"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">單價（依報價單）</label><input class="form-input" type="number" id="f-unitcost" placeholder="0" oninput="calcTotal()"></div><div class="form-group"><label class="form-label">小計</label><input class="form-input" id="f-total" placeholder="自動計算" readonly style="background:var(--bg)"></div></div>
    <div id="rate-hint" style="font-size:11px;color:var(--text3);margin-top:-4px;margin-bottom:8px"></div>
    <div class="form-group"><label class="form-label">狀態</label><select class="form-input" id="f-status"><option>完成</option><option>執行中</option><option>待確認</option></select></div>
  `,()=>{
    const cid=document.getElementById('f-client').value;
    const sid=document.getElementById('f-spec').value;
    if(!cid||!sid)return alert('請填寫必要欄位');
    const qty=Number(document.getElementById('f-qty').value)||1;
    const uc=Number(document.getElementById('f-unitcost').value)||0;
    DB.freelancerRecords.push({id:nextId(DB.freelancerRecords,'FR'),specItemId:sid,clientId:cid,freelancerId:document.getElementById('f-person').value,month:document.getElementById('f-month').value,itemType:document.getElementById('f-itype').value,qty,unitCost:uc,total:qty*uc,status:document.getElementById('f-status').value});
    closeModal();
    if(document.getElementById('client-drawer').classList.contains('open'))renderDrawerBody(cid);
    else renderReportFreelancer();
  });
}
function calcTotal(){
  const q=Number(document.getElementById('f-qty').value)||0;
  const u=Number(document.getElementById('f-unitcost').value)||0;
  document.getElementById('f-total').value=q&&u?'$'+(q*u).toLocaleString():'';
}
function updateRateHint(fid){
  const f=DB.freelancers.find(x=>x.id===fid);
  const el=document.getElementById('rate-hint');
  if(!el)return;
  if(f&&Object.keys(f.rates).length){el.textContent='報價參考：'+Object.entries(f.rates).map(([k,v])=>`${k} $${v}`).join('　');}
  else el.textContent='';
}

function openAddVendor(){
  openModal('新增廠商',`
    <div class="form-group"><label class="form-label">廠商名稱 *</label><input class="form-input" id="f-name"></div>

function openAddFreelancer(){
  openModal('新增外包人員',`
    <div class="form-row"><div class="form-group"><label class="form-label">姓名 *</label><input class="form-input" id="f-name"></div><div class="form-group"><label class="form-label">類型</label><input class="form-input" id="f-type" placeholder="如：文案/回文"></div></div>
    <div class="form-group"><label class="form-label">報價項目（每行一筆，格式：項目名稱,單價）</label><textarea class="form-input" id="f-rates" rows="4" placeholder="即時回文-常規,150&#10;短圖文,850&#10;長圖文,1100"></textarea></div>
  `,()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name)return alert('請填寫姓名');
    const rates={};
    document.getElementById('f-rates').value.split('\n').forEach(line=>{const[k,v]=line.split(',');if(k&&v)rates[k.trim()]=Number(v.trim())||0;});
    DB.freelancers.push({id:nextId(DB.freelancers,'F'),name,type:document.getElementById('f-type').value,rates});
    closeModal();renderSettings();
  });
}
function openEditFreelancer(fid){
  const f=DB.freelancers.find(x=>x.id===fid);
  const rateText=Object.entries(f.rates).map(([k,v])=>`${k},${v}`).join('\n');
  openModal('編輯外包人員：'+f.name,`
    <div class="form-row"><div class="form-group"><label class="form-label">姓名</label><input class="form-input" id="f-name" value="${f.name}"></div><div class="form-group"><label class="form-label">類型</label><input class="form-input" id="f-type" value="${f.type}"></div></div>
    <div class="form-group"><label class="form-label">報價項目（每行：項目名稱,單價）</label><textarea class="form-input" id="f-rates" rows="6">${rateText}</textarea></div>
  `,()=>{
    f.name=document.getElementById('f-name').value;f.type=document.getElementById('f-type').value;
    const rates={};
    document.getElementById('f-rates').value.split('\n').forEach(line=>{const[k,v]=line.split(',');if(k&&v)rates[k.trim()]=Number(v.trim())||0;});
    f.rates=rates;
    closeModal();renderSettings();
  });
}

renderDashboard();
</script>
